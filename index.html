<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contractor Team Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Kanit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#F8FBFF;
    --surface:#FFFFFF;
    --surface-light:#F5F7FF;
    --surface-hover:#EDF3FF;
    --border:#DCE6F4;
    --text-primary:#18243A;
    --text-secondary:#65748B;
    --text-faint:#A3AFBF;
    --accent:#6D5BFF;
    --newsite:#4C9AFF;
    --retrofit:#F2A65A;
    --maintenance:#52C77E;
    --danger:#FF5B73;
    --radius:16px;
    --font-body:'Inter','Kanit',Tahoma,sans-serif;
    --font-display:'Inter','Kanit',Tahoma,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 20%, rgba(90,213,255,.82) 0, rgba(90,213,255,0) 32%),
      radial-gradient(circle at 78% 12%, rgba(255,83,190,.72) 0, rgba(255,83,190,0) 34%),
      radial-gradient(circle at 84% 84%, rgba(255,236,84,.82) 0, rgba(255,236,84,0) 34%),
      linear-gradient(135deg,#6B5CFF 0%,#EC5BC8 45%,#FFE45D 100%);
    color:var(--text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(255,255,255,.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px);
    background-size:28px 28px;
    opacity:.18;
    mix-blend-mode:soft-light;
  }
  .app{
    position:relative;
    width:min(100vw - 32px, 1440px);
    min-height:calc(100vh - 24px);
    margin:12px auto;
    padding:24px;
    background:rgba(255,255,255,.86);
    border:1px solid rgba(255,255,255,.72);
    border-radius:30px;
    box-shadow:
      0 32px 90px rgba(51,34,108,.24),
      inset 0 1px 0 rgba(255,255,255,.85);
    backdrop-filter:blur(22px);
  }

  /* Header */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .header-title{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .header-title .eyebrow{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0;
    text-transform:uppercase;
    color:#FF5BB7;
    font-weight:700;
  }
  .header-title h1{
    margin:0;
    font-family:var(--font-display);
    font-size:26px;
    font-weight:800;
    letter-spacing:0;
    line-height:1.12;
  }
  .month-nav{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.82);
    border:1px solid rgba(210,221,241,.82);
    border-radius:999px;
    padding:6px 8px;
    box-shadow:0 12px 30px rgba(62,79,126,.12);
  }
  .month-nav button{
    width:32px;height:32px;
    border-radius:50%;
    border:none;
    background:#F2F5FF;
    color:#5143D8;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .month-nav button:hover:not(:disabled){background:#E6EAFF;}
  .month-nav button:disabled{opacity:.25;cursor:default;}
  .month-nav .label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-family:var(--font-display);
    font-weight:700;
    min-width:140px;
    text-align:center;
    font-size:15px;
  }
  .year-select{
    border:1px solid transparent;
    background:#F2F5FF;
    color:var(--text-primary);
    border-radius:8px;
    padding:3px 8px;
    font:inherit;
    font-weight:700;
    cursor:pointer;
  }
  .year-select:focus{
    outline:none;
    border-color:#7C6BFF;
  }

  /* Team manager row */
  .toolbar{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:12px;
  }
  .toolbar-actions{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .sync-status{
    display:inline-flex;
    align-items:center;
    gap:7px;
    border:1px solid rgba(210,221,241,.86);
    background:rgba(255,255,255,.7);
    color:var(--text-secondary);
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
  }
  .sync-status::before{
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--text-faint);
    flex:none;
  }
  .sync-status.online::before{background:#19C37D;}
  .sync-status.connecting::before{background:#FFB84D;}
  .sync-status.offline::before{background:var(--danger);}
  .hidden{display:none!important;}
  .btn{
    font-family:var(--font-display);
    border:1px solid rgba(210,221,241,.92);
    background:rgba(255,255,255,.78);
    color:var(--text-primary);
    padding:8px 14px;
    border-radius:12px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;
  }
  .btn:hover{
    background:#F0F4FF;
    border-color:#BBC8E0;
    transform:translateY(-1px);
    box-shadow:0 10px 22px rgba(62,79,126,.1);
  }
  .btn-accent{
    background:linear-gradient(135deg,#6D5BFF,#9B5CFF);
    color:#FFFFFF;
    border-color:transparent;
    font-weight:700;
  }
  .btn-accent:hover{filter:brightness(1.08);}

  /* Calendar grid */
  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-bottom:8px;
  }
  .weekday-row div{
    text-align:center;
    font-size:11px;
    letter-spacing:0;
    text-transform:uppercase;
    color:var(--text-faint);
    font-weight:700;
    padding-bottom:4px;
  }
  .weekday-row div.weekend{color:var(--danger);}

  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-auto-rows:minmax(86px, calc((100vh - 218px) / 6));
    gap:10px;
  }
  .day-cell{
    background:rgba(255,255,255,.78);
    border:1px solid rgba(213,224,242,.96);
    border-radius:var(--radius);
    min-height:0;
    padding:10px;
    cursor:pointer;
    position:relative;
    display:flex;
    flex-direction:column;
    gap:6px;
    box-shadow:0 12px 30px rgba(45,63,102,.08);
    transition:background .15s,border-color .15s,transform .1s, box-shadow .15s;
  }
  .day-cell:hover{
    background:#FFFFFF;
    border-color:#B9C8E4;
    box-shadow:0 16px 36px rgba(45,63,102,.13);
    transform:translateY(-1px);
  }
  .day-cell.empty-day{
    background:rgba(255,255,255,.34);
    border:1px dashed rgba(213,224,242,.85);
    cursor:default;
    opacity:.35;
  }
  .day-cell.today{
    border-color:#7C6BFF;
    background:#F5F2FF;
    box-shadow:0 0 0 2px rgba(124,107,255,.16), 0 14px 34px rgba(124,107,255,.12);
  }
  .day-num{
    font-family:var(--font-display);
    font-size:15px;
    font-weight:800;
    color:var(--text-primary);
  }
  .day-cell.weekend .day-num{color:var(--danger);}
  .tags{
    display:flex;
    flex-direction:column;
    gap:3px;
    overflow:hidden;
  }
  .tag{
    display:flex;
    align-items:center;
    gap:5px;
    font-family:var(--font-display);
    font-size:10.5px;
    color:#0B1220;
    background:var(--newsite);
    border-radius:9px;
    padding:3px 7px 3px 6px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tag .cable{
    width:4px;
    align-self:stretch;
    border-radius:2px;
    background:rgba(0,0,0,.25);
    flex:none;
  }
  .more-hint{
    font-size:10px;
    color:#8493A8;
  }

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(31,41,68,.34);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:16px;
    backdrop-filter:blur(12px);
  }
  .overlay.open{display:flex;}
  .modal{
    background:rgba(255,255,255,.94);
    border:1px solid rgba(255,255,255,.78);
    border-radius:24px;
    width:100%;
    max-width:540px;
    max-height:85vh;
    overflow-y:auto;
    padding:22px;
    box-shadow:0 30px 70px rgba(45,63,102,.28);
  }
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .modal-header h2{
    margin:0;
    font-family:var(--font-display);
    font-size:19px;
    font-weight:800;
  }
  .modal-header .close{
    background:#F2F5FF;border:none;color:#66738A;
    font-size:20px;cursor:pointer;line-height:1;padding:4px;
    width:34px;height:34px;border-radius:50%;
  }
  .team-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    align-items:start;
    gap:8px 12px;
    padding:10px 0;
    border-bottom:1px solid rgba(220,230,244,.92);
  }
  .team-row:last-child{border-bottom:none;}
  .team-name{
    font-family:var(--font-display);
    font-size:14.5px;
    font-weight:700;
    flex:1;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .team-meta,
  .team-summary{
    min-width:0;
  }
  .team-members{
    margin-top:3px;
    color:#64748B;
    font-size:11.5px;
    line-height:1.35;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .proj-options{
    display:flex;
    gap:7px;
    flex:none;
    padding-top:2px;
  }
  .proj-btn{
    width:34px;height:34px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.86);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    opacity:.58;
    box-shadow:0 7px 16px rgba(45,63,102,.14);
    transition:opacity .15s,transform .1s,border-color .15s,box-shadow .15s;
  }
  .proj-btn:hover{opacity:.8;transform:scale(1.06);}
  .proj-btn.active{
    opacity:1;
    border-color:#FFFFFF;
    box-shadow:0 0 0 2px #21304A, 0 10px 22px rgba(45,63,102,.18);
  }
  .proj-btn.p-clear{background:#F2F5FF;color:#65748B;font-size:15px;opacity:.88;}
  .proj-btn.p-clear:hover{opacity:1;}

  .empty-teams{
    text-align:center;
    color:var(--text-secondary);
    font-size:13px;
    padding:20px 0;
  }

  /* Team manager modal */
  .team-edit-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
    align-items:start;
    margin-bottom:8px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(220,230,244,.92);
  }
  .team-edit-fields{
    display:grid;
    gap:7px;
    min-width:0;
  }
  .team-edit-row input{
    flex:1;
    background:#FFFFFF;
    border:1px solid #DCE6F4;
    border-radius:12px;
    color:var(--text-primary);
    padding:8px 10px;
    font-family:var(--font-body);
    font-size:13.5px;
    font-weight:600;
  }
  .team-edit-row input:focus{outline:none;border-color:#7C6BFF;box-shadow:0 0 0 3px rgba(124,107,255,.14);}
  .color-settings{
    border:1px solid #DCE6F4;
    background:#F7F9FF;
    border-radius:16px;
    padding:12px;
    margin-bottom:12px;
  }
  .settings-title{
    font-family:var(--font-display);
    color:var(--text-secondary);
    font-size:11px;
    font-weight:700;
    margin-bottom:8px;
  }
  .color-list{
    display:grid;
    gap:8px;
  }
  .color-control{
    display:grid;
    grid-template-columns:auto minmax(0,1fr) auto;
    align-items:center;
    gap:8px;
    min-width:0;
    border:1px solid #DCE6F4;
    background:#FFFFFF;
    border-radius:12px;
    padding:7px 8px;
  }
  .project-label-input{
    min-width:0;
    height:32px;
    border:1px solid #DCE6F4;
    border-radius:10px;
    background:#F8FAFF;
    font-size:12px;
    color:var(--text-primary);
    padding:0 9px;
    font-family:var(--font-body);
    font-weight:600;
  }
  .project-label-input:focus{outline:none;border-color:#7C6BFF;box-shadow:0 0 0 3px rgba(124,107,255,.12);}
  .project-color-input{
    width:32px;
    height:32px;
    flex:none;
    padding:0;
    border:0;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
  }
  .project-color-input::-webkit-color-swatch-wrapper{padding:0;}
  .project-color-input::-webkit-color-swatch{
    border:2px solid rgba(255,255,255,.55);
    border-radius:50%;
  }
  .project-remove-btn{
    width:30px;
    height:30px;
    border:1px solid #DCE6F4;
    border-radius:10px;
    background:transparent;
    color:var(--text-secondary);
    cursor:pointer;
  }
  .project-remove-btn:hover{
    border-color:var(--danger);
    color:var(--danger);
  }
  .add-project-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) 44px auto;
    gap:8px;
    margin-top:8px;
  }
  .add-project-row input[type="text"]{
    min-width:0;
    height:36px;
    border:1px solid #DCE6F4;
    border-radius:10px;
    background:#FFFFFF;
    color:var(--text-primary);
    padding:0 10px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:12px;
  }
  .add-project-row input[type="color"]{
    width:44px;
    height:36px;
    padding:0;
    border:0;
    background:transparent;
    cursor:pointer;
  }
  .member-list{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    min-height:28px;
    align-items:center;
    flex:1 1 120px;
    min-width:0;
  }
  .member-editor{
    display:grid;
    gap:8px;
    border:1px solid #DCE6F4;
    background:#F7F9FF;
    border-radius:16px;
    padding:10px;
  }
  .team-row > .member-editor{
    grid-column:1 / -1;
    display:grid;
    gap:8px;
    width:100%;
  }
  .member-list-row{
    display:grid;
    grid-template-columns:max-content minmax(0,1fr);
    gap:8px;
    align-items:center;
    min-width:0;
  }
  .member-editor-title{
    font-family:var(--font-display);
    color:var(--text-secondary);
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
    flex:0 0 auto;
  }
  .member-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    max-width:100%;
    border:1px solid #DCE6F4;
    background:#FFFFFF;
    color:var(--text-primary);
    font-family:var(--font-display);
    border-radius:999px;
    padding:5px 7px 5px 9px;
    font-size:12px;
    line-height:1;
  }
  .member-chip span{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .member-remove-btn{
    width:18px;
    height:18px;
    border:0;
    border-radius:50%;
    background:#EDF2FF;
    color:#65748B;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    line-height:1;
  }
  .member-remove-btn:hover{background:var(--danger);color:#fff;}
  .member-add-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:8px;
    align-items:center;
    flex:1 1 230px;
    max-width:320px;
  }
  .team-row > .member-editor .member-add-row{
    grid-column:1 / -1;
    max-width:none;
  }
  .member-add-row input{
    min-width:0;
    height:40px;
    border:1px solid #DCE6F4;
    border-radius:12px;
    background:#FFFFFF;
    color:var(--text-primary);
    padding:0 12px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:13px;
  }
  .member-add-row input::placeholder{color:var(--text-faint);}
  .member-add-row input:focus{
    outline:none;
    border-color:#7C6BFF;
    box-shadow:0 0 0 3px rgba(124,107,255,.14);
  }
  .member-add-btn{
    min-width:96px;
    height:40px;
    justify-content:center;
    white-space:nowrap;
    border-color:transparent;
    background:linear-gradient(135deg,#4C9AFF,#7C6BFF);
    color:#FFFFFF;
    font-weight:700;
  }
  .member-add-btn:hover{
    background:linear-gradient(135deg,#3E8DFF,#6D5BFF);
    border-color:transparent;
  }
  .field-hint{
    color:#6E7E95;
    font-size:11px;
    line-height:1.3;
  }
  .icon-btn{
    background:none;
    border:1px solid #DCE6F4;
    color:var(--text-secondary);
    width:32px;height:32px;
    border-radius:12px;
    cursor:pointer;
    flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{color:var(--danger);border-color:var(--danger);}
  .add-team-row{
    display:flex;gap:8px;margin-top:10px;
  }
  .add-team-row input{
    flex:1;
    background:#FFFFFF;
    border:1px solid #DCE6F4;
    border-radius:12px;
    color:var(--text-primary);
    padding:8px 10px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:13px;
  }

  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#FFFFFF;
    border:1px solid #DCE6F4;
    color:var(--text-primary);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    opacity:0;
    transition:opacity .25s, transform .25s;
    pointer-events:none;
    z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:560px){
    .app{
      margin:0;
      width:100%;
      min-height:100vh;
      border-radius:0;
      padding:18px 14px 34px;
    }
    .grid{grid-auto-rows:minmax(70px, auto);gap:6px;}
    .day-cell{min-height:70px;padding:6px;}
    .tag{font-size:9.5px;}
    .month-nav .label{min-width:118px;font-size:13px;}
    .header-title h1{font-size:20px;}
    .team-row{grid-template-columns:1fr;}
    .proj-options{grid-row:2;}
    .color-list{grid-template-columns:1fr;}
    .member-list-row{grid-template-columns:1fr;}
    .member-editor-title{width:100%;}
    .member-list{min-width:100%;flex-basis:100%;}
    .member-add-row{max-width:none;flex-basis:100%;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-title">
      <span class="eyebrow">Contractor site schedule</span>
      <h1 id="calendarTitle">Contractor Team Calendar</h1>
    </div>
    <div class="month-nav">
      <button id="prevBtn" aria-label="Previous month">‹</button>
      <div class="label">
        <span id="monthLabel"></span>
        <select class="year-select" id="yearSelect" aria-label="Select year"></select>
      </div>
      <button id="nextBtn" aria-label="Next month">›</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-actions">
      <span class="sync-status" id="syncStatus">Local only</span>
      <button class="btn hidden" id="syncNowBtn" type="button">Upload local data</button>
      <button class="btn" id="manageTeamsBtn">⚙ Manage Teams</button>
    </div>
  </div>

  <div class="weekday-row" id="weekdayRow"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Day assignment modal -->
<div class="overlay" id="dayOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="dayModalTitle">Date</h2>
      <button class="close" id="closeDayModal">✕</button>
    </div>
    <div id="teamAssignList"></div>
  </div>
</div>

<!-- Team management modal -->
<div class="overlay" id="teamOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Manage Contractor Teams</h2>
      <button class="close" id="closeTeamModal">✕</button>
    </div>
    <div class="color-settings">
      <div class="settings-title">Work Color Options</div>
      <div class="color-list" id="projectColorList"></div>
      <div class="add-project-row">
        <input type="text" id="newProjectLabel" placeholder="New color label, e.g. Urgent Work">
        <input type="color" id="newProjectColor" value="#7C6BFF" aria-label="New color">
        <button class="btn" id="addProjectBtn" type="button">+ Color</button>
      </div>
    </div>
    <div id="teamEditList"></div>
    <div class="add-team-row">
      <input type="text" id="newTeamInput" placeholder="New team name, e.g. Team D">
      <button class="btn btn-accent" id="addTeamBtn">+ Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_YEAR = 2026;
const YEAR_OPTIONS = Array.from({length:12}, (_,idx)=>2024 + idx);
const MONTH_NAMES = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
const WEEKDAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DEFAULT_PROJECT_OPTIONS = [
  {key:'newsite', label:'New Site', color:'#4C9AFF'},
  {key:'retrofit', label:'Retrofit', color:'#F2A65A'},
  {key:'maintenance', label:'Maintenance', color:'#52C77E'}
];
const DEFAULT_TEAMS = ["Team A","Team B","Team C"];
const LEGACY_TEAM_NAME_MAP = {
  "\u0e17\u0e35\u0e21 A":"Team A",
  "\u0e17\u0e35\u0e21 B":"Team B",
  "\u0e17\u0e35\u0e21 C":"Team C"
};

// Add Firebase config here to enable realtime sync across devices.
// Go to Firebase Console > Project settings > Your apps > Web app.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCfDQvsCjG-tvrSmEHOc-oHqPXUubRN4fE",
  authDomain: "calenda-aa594.firebaseapp.com",
  databaseURL: "https://calenda-aa594-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "calenda-aa594",
  storageBucket: "calenda-aa594.firebasestorage.app",
  messagingSenderId: "476530291239",
  appId: "1:476530291239:web:be130d10914ed2dfad1402"
};
const REALTIME_DATA_PATH = "calenda/team-schedule-2026";

let state = {
  teams: [...DEFAULT_TEAMS],
  dayMembers: {},
  projectOptions: DEFAULT_PROJECT_OPTIONS.map(project=>({...project})),
  assignments: {} // { "2026-07-03": { "Team A": "newsite" } }
};
let currentYear = DEFAULT_YEAR;
let currentMonth = 6; // 0-indexed, default July
let activeDayKey = null;
let sync = {
  mode: "local",
  dataRef: null,
  setRemote: null
};

const todayKey = fmtKey(new Date(2026,6,3));

function fmtKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 1600);
}

async function loadData(){
  loadLocalData();
  render();

  if(!hasFirebaseConfig()){
    setSyncStatus("local", "Local only");
    return;
  }

  await initRealtimeSync();
}

function loadLocalData(){
  try{
    const savedTeams = localStorage.getItem('calenda-teams');
    if(savedTeams) state.teams = JSON.parse(savedTeams);
  }catch(e){}
  try{
    const savedDayMembers = localStorage.getItem('calenda-day-members');
    if(savedDayMembers) state.dayMembers = normalizeDayMembers(JSON.parse(savedDayMembers));
  }catch(e){}
  try{
    const savedProjectOptions = localStorage.getItem('calenda-project-options');
    const savedProjectColors = localStorage.getItem('calenda-project-colors');
    if(savedProjectOptions){
      state.projectOptions = normalizeProjectOptions(JSON.parse(savedProjectOptions));
    } else if(savedProjectColors){
      state.projectOptions = normalizeProjectOptions(null, JSON.parse(savedProjectColors));
    }
  }catch(e){}
  try{
    const savedAssignments = localStorage.getItem('calenda-assignments');
    if(savedAssignments) state.assignments = JSON.parse(savedAssignments);
  }catch(e){}
  normalizeState();
}

function saveLocalSnapshot(){
  try{ localStorage.setItem('calenda-teams', JSON.stringify(state.teams)); }
  catch(e){}
  try{ localStorage.setItem('calenda-day-members', JSON.stringify(state.dayMembers)); }
  catch(e){}
  try{ localStorage.setItem('calenda-project-options', JSON.stringify(state.projectOptions)); }
  catch(e){}
  try{ localStorage.setItem('calenda-assignments', JSON.stringify(state.assignments)); }
  catch(e){}
}

async function saveTeams(){
  saveLocalSnapshot();
  await pushRemoteState('Could not save teams');
}
async function saveAssignments(){
  saveLocalSnapshot();
  await pushRemoteState('Could not save data');
}
async function saveProjectOptions(){
  saveLocalSnapshot();
  await pushRemoteState('Could not save color options');
}

function hasFirebaseConfig(){
  return Boolean(
    FIREBASE_CONFIG.apiKey &&
    FIREBASE_CONFIG.databaseURL &&
    FIREBASE_CONFIG.projectId &&
    FIREBASE_CONFIG.appId
  );
}

function setSyncStatus(mode, text){
  const el = document.getElementById('syncStatus');
  el.textContent = text;
  el.className = `sync-status ${mode}`;
}

function setSyncUploadVisible(visible){
  document.getElementById('syncNowBtn').classList.toggle('hidden', !visible);
}

async function initRealtimeSync(){
  setSyncStatus("connecting", "Connecting");

  try{
    const appModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    const dbModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
    const app = appModule.initializeApp(FIREBASE_CONFIG);
    const database = dbModule.getDatabase(app);

    sync.mode = "realtime";
    sync.dataRef = dbModule.ref(database, REALTIME_DATA_PATH);
    sync.setRemote = dbModule.set;

    dbModule.onValue(sync.dataRef, async (snapshot)=>{
      const remoteData = snapshot.val();

      if(remoteData){
        state.teams = Array.isArray(remoteData.teams) ? remoteData.teams : [...DEFAULT_TEAMS];
        state.dayMembers = normalizeDayMembers(remoteData.dayMembers || {});
        state.projectOptions = normalizeProjectOptions(remoteData.projectOptions, remoteData.projectColors);
        state.assignments = remoteData.assignments && typeof remoteData.assignments === "object"
          ? remoteData.assignments
          : {};
        normalizeState();
        saveLocalSnapshot();
        render();
        refreshOpenModals();
        setSyncStatus("online", "Realtime");
        setSyncUploadVisible(false);
        return;
      }

      setSyncStatus("online", "Realtime ready");
      setSyncUploadVisible(true);
      showToast('Shared database is empty. Upload from the device with the latest data.');
    }, (error)=>{
      console.error(error);
      sync.mode = "local";
      setSyncStatus("offline", "Local fallback");
      setSyncUploadVisible(false);
      showToast('Realtime connection failed. Using local data instead.');
    });
  }catch(error){
    console.error(error);
    sync.mode = "local";
    setSyncStatus("offline", "Local fallback");
    setSyncUploadVisible(false);
    showToast('Could not load Firebase. Using local data instead.');
  }
}

async function pushRemoteState(errorMessage){
  if(sync.mode !== "realtime" || !sync.dataRef || !sync.setRemote) return;

  try{
    await sync.setRemote(sync.dataRef, {
      teams: state.teams,
      dayMembers: state.dayMembers,
      projectOptions: state.projectOptions,
      assignments: state.assignments,
      updatedAt: new Date().toISOString()
    });
    setSyncStatus("online", "Realtime");
    setSyncUploadVisible(false);
  }catch(error){
    console.error(error);
    setSyncStatus("offline", "Sync error");
    showToast(errorMessage);
  }
}

function refreshOpenModals(){
  const dayOverlay = document.getElementById('dayOverlay');
  if(dayOverlay.classList.contains('open') && activeDayKey){
    const parts = activeDayKey.split('-').map(Number);
    openDayModal(activeDayKey, new Date(parts[0], parts[1] - 1, parts[2]));
  }

  const teamOverlay = document.getElementById('teamOverlay');
  if(teamOverlay.classList.contains('open')){
    renderProjectColorList();
    renderTeamEditList();
  }
}

function normalizeState(){
  state.teams = Array.isArray(state.teams) ? state.teams : [...DEFAULT_TEAMS];
  migrateLegacyTeamNames();
  state.dayMembers = normalizeDayMembers(state.dayMembers || {});
  state.projectOptions = normalizeProjectOptions(state.projectOptions, state.projectColors);
  state.assignments = state.assignments && typeof state.assignments === "object" ? state.assignments : {};
  Object.keys(state.dayMembers).forEach(dateKey=>{
    Object.keys(state.dayMembers[dateKey]).forEach(team=>{
      if(!state.teams.includes(team)) delete state.dayMembers[dateKey][team];
    });
    if(Object.keys(state.dayMembers[dateKey]).length===0) delete state.dayMembers[dateKey];
  });
  const validProjectKeys = new Set(getProjectOptions().map(project=>project.key));
  Object.keys(state.assignments || {}).forEach(dateKey=>{
    Object.keys(state.assignments[dateKey]).forEach(team=>{
      if(!validProjectKeys.has(state.assignments[dateKey][team])) delete state.assignments[dateKey][team];
    });
    if(Object.keys(state.assignments[dateKey]).length===0) delete state.assignments[dateKey];
  });
}

function migrateLegacyTeamNames(){
  const rename = name => LEGACY_TEAM_NAME_MAP[name] || name;
  state.teams = Array.from(new Set(state.teams.map(team=>rename(String(team).trim())).filter(Boolean)));
  state.assignments = renameNestedTeamKeys(state.assignments);
  state.dayMembers = renameNestedTeamKeys(state.dayMembers);
}

function renameNestedTeamKeys(value){
  if(!value || typeof value !== "object") return value;
  return Object.fromEntries(Object.entries(value).map(([dateKey, teamsByDate])=>{
    if(!teamsByDate || typeof teamsByDate !== "object") return [dateKey, teamsByDate];
    const renamed = {};
    Object.entries(teamsByDate).forEach(([team, teamValue])=>{
      const nextTeam = LEGACY_TEAM_NAME_MAP[team] || team;
      if(Array.isArray(teamValue)){
        renamed[nextTeam] = Array.from(new Set([...(renamed[nextTeam] || []), ...teamValue]));
      } else {
        renamed[nextTeam] = teamValue;
      }
    });
    return [dateKey, renamed];
  }));
}

function normalizeTeamMembers(value){
  if(!value || typeof value !== "object") return {};
  return Object.fromEntries(Object.entries(value).map(([team, members])=>[
    team,
    Array.isArray(members)
      ? members.map(member => String(member).trim()).filter(Boolean)
      : parseMembersText(members)
  ]));
}

function normalizeDayMembers(value){
  if(!value || typeof value !== "object") return {};
  return Object.fromEntries(Object.entries(value).map(([dateKey, membersByTeam])=>[
    dateKey,
    normalizeTeamMembers(membersByTeam)
  ]));
}

function normalizeProjectOptions(value, legacyColors){
  const hasOptions = Array.isArray(value) && value.length;
  const source = hasOptions ? value : DEFAULT_PROJECT_OPTIONS;
  const usedKeys = new Set();
  const options = source.map((project, idx)=>{
    const fallback = DEFAULT_PROJECT_OPTIONS[idx] || {};
    let key = String(project?.key || fallback.key || `project-${idx + 1}`).trim();
    key = key.replace(/[^a-zA-Z0-9_-]/g, '-').toLowerCase() || `project-${idx + 1}`;
    while(usedKeys.has(key)) key = `${key}-${idx + 1}`;
    usedKeys.add(key);
    const label = String(project?.label || fallback.label || `Color ${idx + 1}`).trim();
    const color = String((hasOptions ? project?.color : legacyColors?.[key]) || project?.color || fallback.color || '#4C9AFF').trim();
    return {
      key,
      label,
      color:/^#[0-9a-f]{6}$/i.test(color) ? color : '#4C9AFF'
    };
  });
  return options.length ? options : DEFAULT_PROJECT_OPTIONS.map(project=>({...project}));
}

function getProjectOptions(){
  return Array.isArray(state.projectOptions) && state.projectOptions.length
    ? state.projectOptions
    : DEFAULT_PROJECT_OPTIONS;
}

function getProjectByKey(key){
  return getProjectOptions().find(project=>project.key === key);
}

function makeProjectKey(label){
  const base = String(label || "project")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "") || "project";
  const usedKeys = new Set(getProjectOptions().map(project=>project.key));
  let key = base;
  let counter = 2;
  while(usedKeys.has(key)){
    key = `${base}-${counter}`;
    counter++;
  }
  return key;
}

function parseMembersText(value){
  return String(value || "")
    .split(/[\n,]+/)
    .map(member => member.trim())
    .filter(Boolean);
}

function formatMembers(team){
  const members = getDayMembers(team);
  return members.length ? members.join(", ") : "No members assigned today";
}

function getDayMembers(team){
  if(!activeDayKey) return [];
  return state.dayMembers[activeDayKey]?.[team] || [];
}

function collectMemberOptions(team){
  const usedToday = new Set(getDayMembers(team));
  const names = new Set();
  Object.values(state.dayMembers || {}).forEach(membersByTeam=>{
    Object.values(membersByTeam || {}).forEach(members=>{
      (members || []).forEach(member=>{
        if(!usedToday.has(member)) names.add(member);
      });
    });
  });
  return Array.from(names).sort((a,b)=>a.localeCompare(b, 'en'));
}

function renderWeekdayRow(){
  const el = document.getElementById('weekdayRow');
  el.innerHTML = WEEKDAY_NAMES.map((d,i)=>
    `<div class="${i===0||i===6?'weekend':''}">${d}</div>`
  ).join('');
}

function daysInMonth(year, monthIdx){
  return new Date(year, monthIdx+1, 0).getDate();
}

function renderYearSelect(){
  const select = document.getElementById('yearSelect');
  if(!YEAR_OPTIONS.includes(currentYear)){
    YEAR_OPTIONS.push(currentYear);
    YEAR_OPTIONS.sort((a,b)=>a-b);
  }
  select.innerHTML = YEAR_OPTIONS.map(year=>
    `<option value="${year}" ${year===currentYear ? 'selected' : ''}>${year}</option>`
  ).join('');
}

function render(){
  document.getElementById('calendarTitle').textContent = `Contractor Team Calendar ${currentYear}`;
  document.title = `Contractor Team Calendar ${currentYear}`;
  document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth];
  renderYearSelect();
  document.getElementById('prevBtn').disabled = currentMonth===0;
  document.getElementById('nextBtn').disabled = currentMonth===11;

  renderWeekdayRow();

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
  const numDays = daysInMonth(currentYear, currentMonth);

  for(let i=0;i<firstDay;i++){
    const div = document.createElement('div');
    div.className = 'day-cell empty-day';
    grid.appendChild(div);
  }

  for(let d=1; d<=numDays; d++){
    const dateObj = new Date(currentYear, currentMonth, d);
    const key = fmtKey(dateObj);
    const dow = dateObj.getDay();
    const isWeekend = dow===0 || dow===6;
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isWeekend?' weekend':'') + (key===todayKey?' today':'');
    cell.dataset.key = key;

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const tagsEl = document.createElement('div');
    tagsEl.className = 'tags';
    const dayAsg = state.assignments[key] || {};
    const entries = Object.entries(dayAsg).filter(([,v])=>v);
    const maxShow = 3;
    entries.slice(0,maxShow).forEach(([team, projKey])=>{
      const proj = getProjectByKey(projKey);
      if(!proj) return;
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.style.background = proj.color;
      tag.innerHTML = `<span class="cable"></span><span>${team}</span>`;
      tagsEl.appendChild(tag);
    });
    if(entries.length > maxShow){
      const more = document.createElement('div');
      more.className = 'more-hint';
      more.textContent = `+${entries.length - maxShow} more`;
      tagsEl.appendChild(more);
    }
    cell.appendChild(tagsEl);

    cell.addEventListener('click', ()=>openDayModal(key, dateObj));
    grid.appendChild(cell);
  }
}

function openDayModal(key, dateObj){
  activeDayKey = key;
  const title = `${MONTH_NAMES[dateObj.getMonth()]} ${dateObj.getDate()}, ${dateObj.getFullYear()}`;
  document.getElementById('dayModalTitle').textContent = title;

  const listEl = document.getElementById('teamAssignList');
  if(state.teams.length===0){
    listEl.innerHTML = `<div class="empty-teams">No teams yet. Open "Manage Teams" to add contractors.</div>`;
  } else {
    const dayAsg = state.assignments[key] || {};
    listEl.innerHTML = state.teams.map((team, idx)=>{
      const current = dayAsg[team] || '';
      const btns = getProjectOptions().map(p=>
        `<button class="proj-btn ${current===p.key?'active':''}" style="background:${escapeAttr(p.color)}" data-team="${escapeAttr(team)}" data-proj="${escapeAttr(p.key)}" title="${escapeAttr(p.label)}"></button>`
      ).join('');
      const clearBtn = `<button class="proj-btn p-clear ${current===''?'active':''}" data-team="${escapeAttr(team)}" data-proj="" title="Unassigned">–</button>`;
      return `<div class="team-row">
        <div class="team-summary">
          <div class="team-name">${escapeHtml(team)}</div>
          <div class="team-members" title="${escapeAttr(formatMembers(team))}">${escapeHtml(formatMembers(team))}</div>
        </div>
        <div class="proj-options">${btns}${clearBtn}</div>
        ${renderMemberControls(team, idx)}
      </div>`;
    }).join('');
  }

  document.getElementById('dayOverlay').classList.add('open');
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

function renderMemberControls(team, idx){
  const optionsId = `member-options-${idx}`;
  const optionItems = collectMemberOptions(team).map(member=>
    `<option value="${escapeAttr(member)}"></option>`
  ).join('');
  return `
    <div class="member-editor">
      <div class="member-list-row">
        <div class="member-editor-title">Members Today</div>
        <div class="member-list" aria-label="Members for ${escapeAttr(team)}">
          ${getDayMembers(team).map(member=>`
            <div class="member-chip" title="${escapeAttr(member)}">
              <span>${escapeHtml(member)}</span>
              <button class="member-remove-btn" type="button" data-team="${escapeAttr(team)}" data-member="${escapeAttr(member)}" aria-label="Remove ${escapeAttr(member)}">×</button>
            </div>
          `).join('') || `<div class="field-hint">None yet</div>`}
        </div>
      </div>
      <div class="member-add-row">
        <input type="text" class="member-name-input" data-team="${escapeAttr(team)}" list="${optionsId}" autocomplete="off" placeholder="Select or type a member" aria-label="Select or type a member for ${escapeAttr(team)}">
        <datalist id="${optionsId}">${optionItems}</datalist>
        <button class="btn member-add-btn" type="button" data-team="${escapeAttr(team)}">+ Member</button>
      </div>
    </div>
  `;
}

function getActiveDateObj(){
  const [year, month, day] = activeDayKey.split('-').map(Number);
  return new Date(year, month - 1, day);
}

document.getElementById('teamAssignList').addEventListener('click', async (e)=>{
  const addMemberBtn = e.target.closest('.member-add-btn');
  if(addMemberBtn){
    const team = addMemberBtn.dataset.team;
    const input = addMemberBtn.parentElement.querySelector('.member-name-input');
    await addMember(team, input, 'day');
    return;
  }

  const removeMemberBtn = e.target.closest('.member-remove-btn');
  if(removeMemberBtn){
    await removeMember(removeMemberBtn.dataset.team, removeMemberBtn.dataset.member, 'day');
    return;
  }

  const btn = e.target.closest('.proj-btn');
  if(!btn) return;
  const team = btn.dataset.team;
  const proj = btn.dataset.proj;
  if(!state.assignments[activeDayKey]) state.assignments[activeDayKey] = {};
  if(proj===''){
    delete state.assignments[activeDayKey][team];
    if(Object.keys(state.assignments[activeDayKey]).length===0) delete state.assignments[activeDayKey];
  } else {
    state.assignments[activeDayKey][team] = proj;
  }
  await saveAssignments();
  openDayModal(activeDayKey, getActiveDateObj());
  render();
});

document.getElementById('teamAssignList').addEventListener('keydown', async (e)=>{
  if(e.key !== 'Enter' || !e.target.classList.contains('member-name-input')) return;
  e.preventDefault();
  await addMember(e.target.dataset.team, e.target, 'day');
});

document.getElementById('closeDayModal').addEventListener('click', ()=>{
  document.getElementById('dayOverlay').classList.remove('open');
});
document.getElementById('dayOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='dayOverlay') document.getElementById('dayOverlay').classList.remove('open');
});

// Team management
function renderProjectColorList(){
  const el = document.getElementById('projectColorList');
  el.innerHTML = getProjectOptions().map(project=>`
    <div class="color-control">
      <input class="project-color-input" type="color" data-project="${escapeAttr(project.key)}" value="${escapeAttr(project.color)}" aria-label="Color for ${escapeAttr(project.label)}">
      <input class="project-label-input" type="text" data-project="${escapeAttr(project.key)}" value="${escapeAttr(project.label)}" aria-label="Color option name">
      <button class="project-remove-btn" type="button" data-project="${escapeAttr(project.key)}" title="Remove color option">×</button>
    </div>
  `).join('');
}

function renderTeamEditList(){
  const el = document.getElementById('teamEditList');
  if(state.teams.length===0){
    el.innerHTML = `<div class="empty-teams">No teams yet. Add the first team below.</div>`;
    return;
  }
  el.innerHTML = state.teams.map((team, idx)=>`
    <div class="team-edit-row">
      <div class="team-edit-fields">
        <input type="text" value="${escapeAttr(team)}" data-idx="${idx}" class="team-name-input" aria-label="Team name">
        <div class="field-hint">Add members from a calendar date.</div>
      </div>
      <button class="icon-btn" data-idx="${idx}" title="Delete team">🗑</button>
    </div>
  `).join('');
}

document.getElementById('manageTeamsBtn').addEventListener('click', ()=>{
  renderProjectColorList();
  renderTeamEditList();
  document.getElementById('teamOverlay').classList.add('open');
});
document.getElementById('closeTeamModal').addEventListener('click', async ()=>{
  document.getElementById('teamOverlay').classList.remove('open');
  render();
});
document.getElementById('teamOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='teamOverlay'){
    document.getElementById('teamOverlay').classList.remove('open');
    render();
  }
});

document.getElementById('projectColorList').addEventListener('input', (e)=>{
  const project = getProjectByKey(e.target.dataset.project);
  if(!project) return;
  if(e.target.classList.contains('project-color-input')){
    project.color = e.target.value;
    document.querySelectorAll('.proj-btn').forEach(btn=>{
      if(btn.dataset.proj === project.key) btn.style.background = project.color;
    });
  }
  if(e.target.classList.contains('project-label-input')){
    project.label = e.target.value.trim() || project.label;
  }
});

document.getElementById('projectColorList').addEventListener('change', async (e)=>{
  const project = getProjectByKey(e.target.dataset.project);
  if(!project) return;
  if(e.target.classList.contains('project-color-input')) project.color = e.target.value;
  if(e.target.classList.contains('project-label-input')) project.label = e.target.value.trim() || project.label;
  state.projectOptions = normalizeProjectOptions(state.projectOptions);
  saveLocalSnapshot();
  render();
  refreshOpenModals();
  await saveProjectOptions();
  showToast('Color options updated');
});

document.getElementById('projectColorList').addEventListener('click', async (e)=>{
  const btn = e.target.closest('.project-remove-btn');
  if(!btn) return;
  if(getProjectOptions().length <= 1){
    showToast('At least one color option is required');
    return;
  }
  const removedKey = btn.dataset.project;
  state.projectOptions = getProjectOptions().filter(project=>project.key !== removedKey);
  Object.keys(state.assignments).forEach(dateKey=>{
    Object.keys(state.assignments[dateKey]).forEach(team=>{
      if(state.assignments[dateKey][team] === removedKey) delete state.assignments[dateKey][team];
    });
    if(Object.keys(state.assignments[dateKey]).length===0) delete state.assignments[dateKey];
  });
  saveLocalSnapshot();
  render();
  refreshOpenModals();
  await saveProjectOptions();
  showToast('Color option removed');
});

document.getElementById('addProjectBtn').addEventListener('click', async ()=>{
  const labelInput = document.getElementById('newProjectLabel');
  const colorInput = document.getElementById('newProjectColor');
  const label = labelInput.value.trim() || `Color ${getProjectOptions().length + 1}`;
  state.projectOptions.push({
    key:makeProjectKey(label),
    label,
    color:colorInput.value
  });
  labelInput.value = '';
  state.projectOptions = normalizeProjectOptions(state.projectOptions);
  saveLocalSnapshot();
  render();
  refreshOpenModals();
  await saveProjectOptions();
  showToast('Color option added');
});

document.getElementById('newProjectLabel').addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;
  e.preventDefault();
  document.getElementById('addProjectBtn').click();
});

document.getElementById('teamEditList').addEventListener('change', async (e)=>{
  if(e.target.classList.contains('team-name-input')){
    const idx = parseInt(e.target.dataset.idx);
    const newName = e.target.value.trim();
    if(!newName) return;
    const oldName = state.teams[idx];
    if(oldName === newName) return;
    if(state.teams.some((team, teamIdx)=>teamIdx !== idx && team === newName)){
      e.target.value = oldName;
      showToast('A team with this name already exists');
      return;
    }
    state.teams[idx] = newName;
    Object.keys(state.assignments).forEach(dateKey=>{
      const dayObj = state.assignments[dateKey];
      if(dayObj[oldName] !== undefined){
        dayObj[newName] = dayObj[oldName];
        delete dayObj[oldName];
      }
    });
    Object.keys(state.dayMembers).forEach(dateKey=>{
      const dayObj = state.dayMembers[dateKey];
      if(dayObj[oldName] !== undefined){
        dayObj[newName] = dayObj[oldName];
        delete dayObj[oldName];
      }
    });
    await saveTeams();
    await saveAssignments();
    renderTeamEditList();
    showToast('Team name updated');
  }
});

document.getElementById('teamEditList').addEventListener('click', async (e)=>{
  const btn = e.target.closest('.icon-btn');
  if(!btn) return;
  const idx = parseInt(btn.dataset.idx);
  const removed = state.teams[idx];
  state.teams.splice(idx,1);
  Object.keys(state.assignments).forEach(dateKey=>{
    delete state.assignments[dateKey][removed];
    if(Object.keys(state.assignments[dateKey]).length===0) delete state.assignments[dateKey];
  });
  Object.keys(state.dayMembers).forEach(dateKey=>{
    delete state.dayMembers[dateKey][removed];
    if(Object.keys(state.dayMembers[dateKey]).length===0) delete state.dayMembers[dateKey];
  });
  await saveTeams();
  await saveAssignments();
  renderTeamEditList();
  showToast(`Removed ${removed}`);
});

async function addMember(team, input){
  const member = input.value.trim();
  if(!member) return;
  if(!activeDayKey) return;
  if(!state.dayMembers[activeDayKey]) state.dayMembers[activeDayKey] = {};
  if(!state.dayMembers[activeDayKey][team]) state.dayMembers[activeDayKey][team] = [];
  if(state.dayMembers[activeDayKey][team].includes(member)){
    showToast('This member is already added');
    return;
  }
  state.dayMembers[activeDayKey][team].push(member);
  input.value = '';
  await saveTeams();
  refreshMemberViews();
  showToast(`Added ${member}`);
}

async function removeMember(team, member){
  if(!activeDayKey || !state.dayMembers[activeDayKey]?.[team]) return;
  state.dayMembers[activeDayKey][team] = state.dayMembers[activeDayKey][team].filter(name => name !== member);
  if(state.dayMembers[activeDayKey][team].length===0) delete state.dayMembers[activeDayKey][team];
  if(Object.keys(state.dayMembers[activeDayKey]).length===0) delete state.dayMembers[activeDayKey];
  await saveTeams();
  refreshMemberViews();
  showToast(`Removed ${member}`);
}

function refreshMemberViews(){
  const teamOverlay = document.getElementById('teamOverlay');
  if(teamOverlay.classList.contains('open')) renderTeamEditList();

  const dayOverlay = document.getElementById('dayOverlay');
  if(dayOverlay.classList.contains('open') && activeDayKey){
    openDayModal(activeDayKey, getActiveDateObj());
  }

  render();
}

document.getElementById('addTeamBtn').addEventListener('click', addTeam);
document.getElementById('newTeamInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') addTeam();
});
async function addTeam(){
  const input = document.getElementById('newTeamInput');
  const name = input.value.trim();
  if(!name) return;
  if(state.teams.includes(name)){ showToast('A team with this name already exists'); return; }
  state.teams.push(name);
  input.value = '';
  await saveTeams();
  renderTeamEditList();
  showToast(`Added ${name}`);
}

document.getElementById('prevBtn').addEventListener('click', ()=>{
  if(currentMonth>0){ currentMonth--; render(); }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(currentMonth<11){ currentMonth++; render(); }
});
document.getElementById('yearSelect').addEventListener('change', (e)=>{
  currentYear = Number(e.target.value) || DEFAULT_YEAR;
  render();
});
document.getElementById('syncNowBtn').addEventListener('click', async ()=>{
  saveLocalSnapshot();
  await pushRemoteState('Could not upload data');
  if(sync.mode === "realtime") showToast('Local data uploaded');
});

loadData();
</script>
</body>
</html>
